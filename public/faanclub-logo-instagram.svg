<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- brand-green background -->
  <rect width="1080" height="1080" fill="#235836"/>
  <g transform="translate(165, 165) scale(23.4375)">
    <!-- outer tile: brand-green -->
    <rect width="32" height="32" rx="6" fill="#235836"/>
    <!-- cream face: brand-cream with brand-creamShadow stroke -->
    <rect x="5" y="5" width="22" height="22" rx="3.5" fill="#F5F0E1" stroke="#D4C5A2" stroke-width="0.8"/>
    <!-- tile border: brand-greenDeep -->
    <rect x="9" y="8" width="14" height="16" rx="2" fill="none" stroke="#1c4a2a" stroke-width="1.2"/>
    <!-- circle ring: brand-greenDeep -->
    <circle cx="16" cy="16" r="3.5" fill="none" stroke="#1c4a2a" stroke-width="1.2"/>
    <!-- center dot: brand-greenDeep -->
    <circle cx="16" cy="16" r="1.4" fill="#1c4a2a"/>
  </g>
</svg>
